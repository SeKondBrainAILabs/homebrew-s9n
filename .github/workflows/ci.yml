name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck -s sh install.sh

  formula:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Lint formula style (informational)
        continue-on-error: true
        run: brew style Formula/s9n.rb
      - name: Install + test the formula end-to-end
        run: |
          # Modern Homebrew only installs formulae from a tap, so expose this
          # checkout as the tap, then install + run its test block.
          tap="$(brew --repository)/Library/Taps/sekondbrainailabs/homebrew-s9n"
          mkdir -p "$(dirname "$tap")"
          ln -s "$GITHUB_WORKSPACE" "$tap"
          brew install sekondbrainailabs/s9n/s9n
          s9n --version
          brew test s9n
